version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: courseforge-postgres
    environment:
      POSTGRES_DB: courseforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: courseforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courseforge-backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@postgres:5432/courseforge
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      JWT_SECRET: production_super_secret_jwt_key_change_me_in_prod_12345
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courseforge-celery-worker
    command: celery -A core.celery_app worker --loglevel=info
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@postgres:5432/courseforge
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      JWT_SECRET: production_super_secret_jwt_key_change_me_in_prod_12345
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: courseforge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
