version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: courseforge-postgres
    environment:
      POSTGRES_DB: courseforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courseforge-backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@postgres:5432/courseforge
      JWT_SECRET_KEY: production_super_secret_jwt_key_change_me_in_prod_12345
      APP_SECRET_KEY: production_super_secret_app_key_change_me_in_prod_12345
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: courseforge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:

