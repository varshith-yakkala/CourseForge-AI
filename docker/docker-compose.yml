# ═══════════════════════════════════════════════════════════════
# CourseForge AI — Docker Compose
# ═══════════════════════════════════════════════════════════════
# Services:
#   postgres  — PostgreSQL 15 (primary database)
#   backend   — FastAPI application
#   frontend  — React app served by Nginx
# ═══════════════════════════════════════════════════════════════

version: "3.9"

x-backend-env: &backend-env
  env_file:
    - ../.env

services:

  postgres:
    image: postgres:15-alpine
    container_name: courseforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-courseforge}
      POSTGRES_USER: ${POSTGRES_USER:-courseforge_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-courseforge_user} -d ${POSTGRES_DB:-courseforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - courseforge_net

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: courseforge_backend
    restart: unless-stopped
    <<: *backend-env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - uploads_data:/app/uploads
      - exports_data:/app/exports
      - logs_data:/app/logs
    ports:
      - "${APP_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - courseforge_net

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8001
    container_name: courseforge_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - courseforge_net

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  exports_data:
    driver: local
  logs_data:
    driver: local

networks:
  courseforge_net:
    driver: bridge

