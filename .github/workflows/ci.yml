name: CourseForge AI CI Pipeline

on:
  push:
    branches: [ main, master, "v*" ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Pytest & Linting
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: courseforge_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest pytest-asyncio pytest-mock

      - name: Run Pytest Suite
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/courseforge_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci_pipeline_secret_jwt_key_12345
        run: |
          cd backend
          pytest --no-cov

  frontend-test:
    name: Frontend Vitest & Vite Production Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Vitest Test Suite
        run: |
          cd frontend
          npm test -- --watch=false

      - name: Verify Production Vite Build
        run: |
          cd frontend
          npm run build
